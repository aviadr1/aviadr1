name: Update Latest Writing

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build latest writing block
        run: |
          python - <<'PY'
          from __future__ import annotations
          import datetime as dt
          import re
          import ssl
          import urllib.request
          import xml.etree.ElementTree as ET
          from email.utils import parsedate_to_datetime

          README = "README.md"
          START = "<!-- LATEST-WRITING:START -->"
          END = "<!-- LATEST-WRITING:END -->"
          FEEDS = [
              ("Ghost", "https://civilizational-gradient.ghost.io/rss/"),
              ("dev.to", "https://dev.to/feed/aviadr1"),
              ("LessWrong", "https://www.greaterwrong.com/users/aviad-rozenhek?show=posts&format=rss"),
          ]
          MAX = 8

          def fetch_xml(url: str) -> ET.Element:
              ctx = ssl.create_default_context()
              req = urllib.request.Request(url, headers={"User-Agent": "aviadr1-profile-readme-updater/1.0"})
              with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                  data = r.read()
              return ET.fromstring(data)

          def text(el, path: str, default: str = "") -> str:
              node = el.find(path)
              return (node.text or "").strip() if node is not None and node.text else default

          def parse_date(s: str) -> dt.datetime:
              if not s:
                  return dt.datetime(1970, 1, 1, tzinfo=dt.timezone.utc)
              try:
                  d = parsedate_to_datetime(s)
                  if d.tzinfo is None:
                      d = d.replace(tzinfo=dt.timezone.utc)
                  return d.astimezone(dt.timezone.utc)
              except Exception:
                  return dt.datetime(1970, 1, 1, tzinfo=dt.timezone.utc)

          items: list[tuple[dt.datetime, str]] = []
          for source, url in FEEDS:
              try:
                  root = fetch_xml(url)
              except Exception:
                  continue

              channel = root.find("channel")
              if channel is None:
                  continue

              for it in channel.findall("item"):
                  title = text(it, "title")
                  link = text(it, "link")
                  pub = text(it, "pubDate")
                  if not title or not link:
                      continue
                  d = parse_date(pub)
                  if source == "LessWrong":
                      link = link.replace("https://www.greaterwrong.com/", "https://www.lesswrong.com/")\
                                 .replace("https://greaterwrong.com/", "https://www.lesswrong.com/")
                  line = f"- [{title}]({link}) · {source}"
                  items.append((d, line))

          items.sort(key=lambda x: x[0], reverse=True)
          lines = [line for _, line in items[:MAX]]
          if not lines:
              lines = ["- No recent posts found."]

          with open(README, "r", encoding="utf-8") as f:
              content = f.read()

          pattern = re.compile(re.escape(START) + r".*?" + re.escape(END), re.DOTALL)
          replacement = START + "\n" + "\n".join(lines) + "\n" + END
          if START not in content or END not in content:
              raise RuntimeError("LATEST-WRITING markers not found in README.md")

          new_content = pattern.sub(replacement, content)
          if new_content == content:
              print("No block change produced")
          else:
              print(f"Updated block with {len(lines)} entries")

          with open(README, "w", encoding="utf-8") as f:
              f.write(new_content)
          PY

      - name: Commit changes
        run: |
          git status --short
          if git diff --quiet -- README.md; then
            echo "No README changes"
            exit 0
          fi
          git config user.name "aviadr1-bot"
          git config user.email "aviadr1-bot@users.noreply.github.com"
          git add README.md
          git commit -m "Update latest writing section"
          git push
